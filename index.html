<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affichage des Couleurs et Logo France</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #002366; /* Bleu marine profond */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Le drapeau (les couleurs) */
        .drapeau {
            display: flex;
            width: 300px;
            height: 150px;
            margin-bottom: 30px;
            border: 2px solid #ffffff;
            overflow: hidden;
            border-radius: 5px;
        }

        .bande {
            flex: 1;
        }

        .bleu { background-color: #0055A4; }    /* Bleu */
        .blanc { background-color: #FFFFFF; }    /* Blanc */
        .rouge { background-color: #EF4135; }    /* Rouge */

        /* Le logo (Coq) */
        .logo-container {
            margin-top: 20px;
        }

        .coq-logo {
            width: 100px; /* Taille du logo */
            height: 100px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }

        .legende {
            margin-top: 10px;
            color: #002366;
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Ajout du texte "FRANCE" comme sur l'écharpe */
        .texte-france {
            font-size: 2em;
            font-weight: bold;
            color: #002366;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

    </style>
